<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Vans - Iguaíba</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .info-topo { 
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: white; padding: 10px 20px; 
            border-radius: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            font-weight: bold; color: #007bff; border: 2px solid #007bff;
        }
    </style>
</head>
<body>
    <div class="info-topo">🚐 Vans Iguaíba - Mercado (Ao Vivo)</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6xIqgV-XzwNScNyN6mc4l35tRJ7sc8fY",
            authDomain: "rastreamentovansemtemporeal.firebaseapp.com",
            databaseURL: "https://rastreamentovansemtemporeal-default-rtdb.firebaseio.com",
            projectId: "rastreamentovansemtemporeal",
            storageBucket: "rastreamentovansemtemporeal.firebasestorage.app",
            messagingSenderId: "213731313803",
            appId: "1:213731313803:web:9ace8d7bdb2ef2a165ec8e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Limites da Grande Ilha
        const limitesIlha = L.latLngBounds(L.latLng(-2.75, -44.50), L.latLng(-2.35, -43.90));
        const map = L.map('map', { maxBounds: limitesIlha, minZoom: 11 }).setView([-2.5307, -44.3068], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // ÍCONE USANDO SUA IMAGEM LOCAL van.PNG
        const vanIcon = L.icon({
            iconUrl: 'van.PNG', // Se estiver em uma pasta, use 'img/van.png'
            iconSize: [45, 45],
            iconAnchor: [22, 45],
            popupAnchor: [0, -45]
        });

        let markers = {};

        onValue(ref(db, 'vans'), (snapshot) => {
            const data = snapshot.val();
            
            // Remove quem saiu do Firebase
            for (let id in markers) {
                if (!data || !data[id]) {
                    map.removeLayer(markers[id]);
                    delete markers[id];
                }
            }

            if (data) {
                for (let id in data) {
                    const { lat, lng, nome } = data[id];
                    if (markers[id]) {
                        markers[id].setLatLng([lat, lng]);
                    } else {
                        // Cria marcador com balão fixo aberto
                        markers[id] = L.marker([lat, lng], { icon: vanIcon }).addTo(map)
                            .bindPopup(`<b>${nome}</b>`, { 
                                autoClose: false, 
                                closeOnClick: false 
                            })
                            .openPopup();
                    }
                }
            }
        });
    </script>
</body>
</html>
