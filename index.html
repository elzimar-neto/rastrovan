<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Vans - Iguaíba</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .info { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-weight: bold; }
    </style>
</head>
<body>
    <div class="info">Visualizando Vans em Tempo Real</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6xIqgV-XzwNScNyN6mc4l35tRJ7sc8fY",
            authDomain: "rastreamentovansemtemporeal.firebaseapp.com",
            databaseURL: "https://rastreamentovansemtemporeal-default-rtdb.firebaseio.com",
            projectId: "rastreamentovansemtemporeal",
            storageBucket: "rastreamentovansemtemporeal.firebasestorage.app",
            messagingSenderId: "213731313803",
            appId: "1:213731313803:web:9ace8d7bdb2ef2a165ec8e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Foco inicial na Grande Ilha
        const map = L.map('map').setView([-2.5307, -44.3068], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const vanIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/1048/1048314.png',
            iconSize: [40, 40], iconAnchor: [20, 40], popupAnchor: [0, -40]
        });

        let markers = {};

        // ESCUTA A PASTA 'vans' NO FIREBASE
        const vansRef = ref(db, 'vans');
        onValue(vansRef, (snapshot) => {
            const data = snapshot.val();
            console.log("Dados recebidos do Firebase:", data); // Verifique isso no F12

            // Limpa do mapa quem saiu do Firebase
            for (let id in markers) {
                if (!data || !data[id]) {
                    map.removeLayer(markers[id]);
                    delete markers[id];
                }
            }

            // Atualiza ou Cria os marcadores
            if (data) {
                for (let id in data) {
                    const { lat, lng, nome } = data[id];
                    if (markers[id]) {
                        markers[id].setLatLng([lat, lng]);
                    } else {
                        markers[id] = L.marker([lat, lng], { icon: vanIcon }).addTo(map)
                            .bindPopup(`<b>Van: ${nome}</b>`);
                    }
                }
            }
        });
    </script>
</body>
</html>
