<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Motorista - Iguaíba</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #1a1a1a; color: white; }
        #status { font-size: 1.3rem; margin-bottom: 20px; text-align: center; color: #ccc; }
        #btn { 
            width: 220px; height: 220px; border-radius: 50%; border: 8px solid #333; 
            font-size: 1.6rem; font-weight: bold; cursor: pointer; background: #28a745; color: white;
            box-shadow: 0 0 20px rgba(40, 167, 69, 0.4); transition: 0.3s;
        }
        #btn.active { background: #dc3545; border-color: #551111; box-shadow: 0 0 30px rgba(220, 53, 69, 0.6); }
        .instrucao { margin-top: 30px; font-size: 0.8rem; color: #888; padding: 0 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="status">GPS Pronto para Iniciar</div>
    <button id="btn">INICIAR ROTA</button>
    <p class="instrucao">Mantenha esta tela aberta durante a viagem.<br>Certifique-se de que o GPS está no modo "Alta Precisão".</p>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6xIqgV-XzwNScNyN6mc4l35tRJ7sc8fY",
            authDomain: "rastreamentovansemtemporeal.firebaseapp.com",
            databaseURL: "https://rastreamentovansemtemporeal-default-rtdb.firebaseio.com",
            projectId: "rastreamentovansemtemporeal",
            storageBucket: "rastreamentovansemtemporeal.firebasestorage.app",
            messagingSenderId: "213731313803",
            appId: "1:213731313803:web:9ace8d7bdb2ef2a165ec8e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let watchID = null;

        const btn = document.getElementById('btn');
        const status = document.getElementById('status');

        btn.onclick = function() {
            if (!watchID) {
                const nome = prompt("Seu Nome (ex: João - Van 02):");
                if (!nome) return;

                watchID = navigator.geolocation.watchPosition((pos) => {
                    const vanRef = ref(db, 'vans/' + nome);
                    set(vanRef, { 
                        lat: pos.coords.latitude, 
                        lng: pos.coords.longitude, 
                        nome: nome,
                        timestamp: Date.now()
                    });
                    
                    onDisconnect(vanRef).remove();

                    status.innerHTML = `TRANSMITINDO AGORA:<br><b style="color:#28a745">${nome}</b>`;
                    btn.innerText = "PARAR ROTA";
                    btn.classList.add('active');
                }, (err) => alert("Erro no GPS: " + err.message), 
                { 
                    enableHighAccuracy: true, // Força alta precisão
                    maximumAge: 0, 
                    timeout: 10000 
                });
            } else {
                if(confirm("Deseja parar de transmitir?")) {
                    location.reload();
                }
            }
        };
    </script>
</body>
</html>
