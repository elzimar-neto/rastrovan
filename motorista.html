<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel RastroVan 1.0</title>
    <link rel="icon" type="image/png" href="van.png">
    <style>
        body { font-family: sans-serif; margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; height: 100vh; }
        .conteudo { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .sentido-box { margin-bottom: 20px; background: #222; padding: 15px; border-radius: 12px; width: 280px; }
        #btn { width: 180px; height: 180px; border-radius: 50%; border: 6px solid #333; font-size: 1.4rem; font-weight: bold; cursor: pointer; background: #28a745; color: white; }
        #btn.active { background: #dc3545; }
        .footer-motorista { background: #111; padding: 15px; font-size: 0.7rem; color: #777; text-align: center; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <div class="conteudo">
        <h2>🛰️ RastroVan 1.0</h2>
        <div class="sentido-box" id="config">
            <label><input type="radio" name="sentido" value="Sentido Centro" checked> 🏙️ Sentido Centro</label><br><br>
            <label><input type="radio" name="sentido" value="Sentido Bairro"> 🏡 Sentido Bairro</label>
        </div>
        <button id="btn">INICIAR ROTA</button>
        <audio id="silentAudio" loop><source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3" type="audio/mp3"></audio>
    </div>
    <div class="footer-motorista">
        Desenvolvido por <b>Elzimar José de Carvalho Neto</b>.<br>
        © Copyright 2026 | elzimar.neto@gmail.com
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6xIqgV-XzwNScNyN6mc4l35tRJ7sc8fY",
            authDomain: "rastreamentovansemtemporeal.firebaseapp.com",
            databaseURL: "https://rastreamentovansemtemporeal-default-rtdb.firebaseio.com",
            projectId: "rastreamentovansemtemporeal",
            storageBucket: "rastreamentovansemtemporeal.firebasestorage.app",
            messagingSenderId: "213731313803",
            appId: "1:213731313803:web:9ace8d7bdb2ef2a165ec8e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let watchID = null, wakeLock = null;
        const btn = document.getElementById('btn'), config = document.getElementById('config'), audio = document.getElementById('silentAudio');

        btn.onclick = async function() {
            if (!watchID) {
                const nome = prompt("Nome do Motorista:");
                if (!nome) return;
                const sentido = document.querySelector('input[name="sentido"]:checked').value;
                try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); audio.play(); } catch (e) {}
                
                watchID = navigator.geolocation.watchPosition((pos) => {
                    set(ref(db, 'vans/' + nome), { lat: pos.coords.latitude, lng: pos.coords.longitude, nome: nome, sentido: sentido, timestamp: Date.now() });
                    onDisconnect(ref(db, 'vans/' + nome)).remove();
                    btn.innerText = "PARAR"; btn.classList.add('active'); config.style.display = 'none';
                }, (err) => console.log(err), { enableHighAccuracy: true });
            } else { location.reload(); }
        };
    </script>
</body>
</html>
