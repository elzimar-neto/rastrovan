<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Motorista - Iguaíba</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #222; color: white; }
        .status { font-size: 1.2rem; margin-bottom: 30px; text-align: center; padding: 0 20px; }
        .btn { 
            width: 200px; height: 200px; border-radius: 50%; border: none; 
            font-size: 1.5rem; font-weight: bold; cursor: pointer; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); transition: 0.3s;
        }
        .btn-off { background: #28a745; color: white; }
        .btn-on { background: #dc3545; color: white; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(220, 53, 69, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); } }
    </style>
</head>
<body>

    <div class="status" id="txtStatus">GPS Desligado.<br>Clique no botão para iniciar a rota.</div>
    <button id="btnPower" class="btn btn-off">INICIAR</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, set, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6xIqgV-XzwNScNyN6mc4l35tRJ7sc8fY",
            authDomain: "rastreamentovansemtemporeal.firebaseapp.com",
            databaseURL: "https://rastreamentovansemtemporeal-default-rtdb.firebaseio.com",
            projectId: "rastreamentovansemtemporeal",
            storageBucket: "rastreamentovansemtemporeal.firebasestorage.app",
            messagingSenderId: "213731313803",
            appId: "1:213731313803:web:9ace8d7bdb2ef2a165ec8e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let watchID = null;
        const btn = document.getElementById('btnPower');
        const txt = document.getElementById('txtStatus');

        btn.addEventListener('click', () => {
            if (!watchID) {
                const nome = prompt("Seu nome ou número da Van:");
                if (!nome) return;

                watchID = navigator.geolocation.watchPosition((pos) => {
                    const vanRef = ref(db, 'vans/' + nome);
                    set(vanRef, { lat: pos.coords.latitude, lng: pos.coords.longitude, nome: nome });
                    onDisconnect(vanRef).remove();
                    
                    txt.innerHTML = `TRANSMITINDO AGORA<br><b>${nome}</b>`;
                    btn.innerText = "PARAR";
                    btn.className = "btn btn-on";
                }, (err) => alert("Erro GPS: " + err.message), { enableHighAccuracy: true });
            } else {
                location.reload();
            }
        });
    </script>
</body>
</html>
