<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Motorista</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #222; color: white; }
        #btn { width: 200px; height: 200px; border-radius: 50%; border: none; font-size: 1.5rem; cursor: pointer; background: #28a745; color: white; }
        #btn.active { background: #dc3545; }
    </style>
</head>
<body>
    <h2 id="msg">GPS Desligado</h2>
    <button id="btn">INICIAR</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, set, onDisconnect } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6xIqgV-XzwNScNyN6mc4l35tRJ7sc8fY",
            authDomain: "rastreamentovansemtemporeal.firebaseapp.com",
            databaseURL: "https://rastreamentovansemtemporeal-default-rtdb.firebaseio.com",
            projectId: "rastreamentovansemtemporeal",
            storageBucket: "rastreamentovansemtemporeal.firebasestorage.app",
            messagingSenderId: "213731313803",
            appId: "1:213731313803:web:9ace8d7bdb2ef2a165ec8e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let watchID = null;

        document.getElementById('btn').onclick = function() {
            if (!watchID) {
                const nome = prompt("Nome da Van:");
                if (!nome) return;

                watchID = navigator.geolocation.watchPosition((pos) => {
                    const vanRef = ref(db, 'vans/' + nome);
                    set(vanRef, { lat: pos.coords.latitude, lng: pos.coords.longitude, nome: nome });
                    onDisconnect(vanRef).remove();
                    
                    document.getElementById('msg').innerText = "Transmitindo: " + nome;
                    this.innerText = "PARAR";
                    this.classList.add('active');
                }, (err) => alert(err.message), { enableHighAccuracy: true });
            } else {
                location.reload();
            }
        };
    </script>
</body>
</html>
