<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel RastroVan 1.0 - Motorista</title>
    <link rel="icon" type="image/png" href="van.png">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; }
        .conteudo { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        
        .card { background: #1e1e1e; padding: 15px; border-radius: 15px; border: 1px solid #333; width: 90%; max-width: 320px; margin-bottom: 20px; }
        select, input[type="radio"] { margin: 10px 0; }
        label { display: block; margin: 10px 0; font-size: 1.1rem; cursor: pointer; }

        #btnIniciar { 
            width: 180px; height: 180px; border-radius: 50%; border: 6px solid #333; 
            font-size: 1.4rem; font-weight: bold; cursor: pointer; background: #28a745; color: white;
            box-shadow: 0 0 20px rgba(40,167,69,0.3); transition: 0.3s;
        }
        #btnIniciar.active { background: #dc3545; box-shadow: 0 0 30px rgba(220,53,69,0.5); }

        .footer-motorista { background: #0a0a0a; padding: 15px; font-size: 0.7rem; color: #666; text-align: center; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <div class="conteudo">
        <h2>🛰️ RastroVan 1.0</h2>
        
        <div class="card" id="painelConfig">
            <strong>Escolha o Sentido:</strong>
            <label><input type="radio" name="sentido" value="Sentido Centro" checked> 🏙️ Sentido Centro</label>
            <label><input type="radio" name="sentido" value="Sentido Bairro"> 🏡 Sentido Bairro</label>
            
            <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
            
            <strong>Modo de Gravação:</strong><br>
            <select id="modoGravacao" style="padding: 8px; border-radius: 5px; width: 100%; margin-top: 5px;">
                <option value="nao">Não Gravar (Padrão)</option>
                <option value="sim">🔴 Gravar Nova Rota</option>
            </select>
        </div>

        <button id="btnIniciar">INICIAR ROTA</button>
        <audio id="silentAudio" loop><source src="https://raw.githubusercontent.com/anars/blank-audio/master/10-seconds-of-silence.mp3" type="audio/mp3"></audio>
    </div>

    <div class="footer-motorista">
        Desenvolvido por <b>Elzimar José de Carvalho Neto</b>. © 2026<br>elzimar.neto@gmail.com
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getDatabase, ref, set, push, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD6xIqgV-XzwNScNyN6mc4l35tRJ7sc8fY",
            authDomain: "rastreamentovansemtemporeal.firebaseapp.com",
            databaseURL: "https://rastreamentovansemtemporeal-default-rtdb.firebaseio.com",
            projectId: "rastreamentovansemtemporeal",
            storageBucket: "rastreamentovansemtemporeal.firebasestorage.app",
            messagingSenderId: "213731313803",
            appId: "1:213731313803:web:9ace8d7bdb2ef2a165ec8e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let watchID = null, wakeLock = null;

        const btnIniciar = document.getElementById('btnIniciar');
        const modoGravacao = document.getElementById('modoGravacao');
        const audio = document.getElementById('silentAudio');
        const painelConfig = document.getElementById('painelConfig');

        btnIniciar.onclick = async function() {
            if (!watchID) {
                const nome = prompt("Nome do Motorista:");
                if (!nome) return;
                
                const sentido = document.querySelector('input[name="sentido"]:checked').value;
                const gravar = modoGravacao.value === "sim";

                if (gravar && !confirm(`Isso apagará a rota antiga do ${sentido}. Confirmar?`)) return;

                try { 
                    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
                    audio.play(); 
                } catch (e) {}

                // Se for gravar, limpa apenas a rota do sentido escolhido
                if (gravar) {
                    const rotaPath = sentido === "Sentido Centro" ? "rota_centro" : "rota_bairro";
                    remove(ref(db, rotaPath));
                }

                watchID = navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude } = pos.coords;
                    
                    // 1. Atualiza Van
                    set(ref(db, 'vans/' + nome), { lat: latitude, lng: longitude, nome: nome, sentido: sentido, timestamp: Date.now() });
                    onDisconnect(ref(db, 'vans/' + nome)).remove();

                    // 2. Grava na rota específica se modo estiver ativo
                    if (gravar) {
                        const rotaPath = sentido === "Sentido Centro" ? "rota_centro" : "rota_bairro";
                        push(ref(db, rotaPath), { lat: latitude, lng: longitude });
                    }

                    btnIniciar.innerText = "PARAR";
                    btnIniciar.classList.add('active');
                    painelConfig.style.display = 'none';
                }, (err) => alert("Erro GPS"), { enableHighAccuracy: true });
            } else { location.reload(); }
        };
    </script>
</body>
</html>
